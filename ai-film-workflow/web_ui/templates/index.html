<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 影片工作流</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">

        <!-- ========== 首页视图 ========== -->
        <div id="homeView" class="view">
            <header>
                <h1>🎬 AI 影片工作流</h1>
                <p class="subtitle">璐子秦出品 —— 有点傻但靠谱</p>
            </header>

            <!-- 对话面板 -->
            <section class="chat-section">
                <div class="chat-header">
                    <h2>💬 AI 助手</h2>
                    <button class="btn-trash chat-trash" title="清空聊天记录" onclick="clearChatHistory()">🗑️</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="输入消息，聊聊你想拍的影片..." onkeydown="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()" class="btn-primary">发送</button>
                </div>
                <div class="chat-quick-actions">
                    <button onclick="quickChat('帮我写一个30秒的科幻短片剧本')" class="btn-quick">🚀 写科幻剧本</button>
                    <button onclick="quickChat('我想做一个温馨的宠物故事')" class="btn-quick">🐱 宠物故事</button>
                    <button onclick="quickChat('帮我做一个产品宣传片')" class="btn-quick">📦 产品宣传</button>
                    <button onclick="quickChat('教我怎么开始')" class="btn-quick">❓ 教我开始</button>
                </div>
            </section>

            <section class="project-section">
                <h2>项目</h2>
                <div class="project-controls">
                    <input type="text" id="projectName" placeholder="输入项目名称">
                    <button onclick="createProject()" class="btn-primary">创建项目</button>
                    <button onclick="loadProjects()" class="btn-secondary">刷新列表</button>
                </div>
                <div id="projectList" class="project-list"></div>
            </section>
        </div>

        <!-- ========== 工作流视图 ========== -->
        <div id="workflowView" class="view" style="display:none;">
            <!-- 顶栏 -->
            <div class="workflow-topbar">
                <button onclick="goBackHome()" class="btn-back">← 返回</button>
                <h1 class="project-title" id="workflowProjectTitle">🎬</h1>
            </div>

            <!-- 进度条 -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-node" data-stage="1" onclick="switchStage(1)">
                    <span class="node-dot">1</span>
                    <span class="node-label">剧本</span>
                </div>
                <div class="progress-line"></div>
                <div class="progress-node" data-stage="2" onclick="switchStage(2)">
                    <span class="node-dot">2</span>
                    <span class="node-label">分镜脚本</span>
                </div>
                <div class="progress-line"></div>
                <div class="progress-node" data-stage="3" onclick="switchStage(3)">
                    <span class="node-dot">3</span>
                    <span class="node-label">资产</span>
                </div>
                <div class="progress-line"></div>
                <div class="progress-node" data-stage="4" onclick="switchStage(4)">
                    <span class="node-dot">4</span>
                    <span class="node-label">分镜</span>
                </div>
                <div class="progress-line"></div>
                <div class="progress-node" data-stage="5" onclick="switchStage(5)">
                    <span class="node-dot">5</span>
                    <span class="node-label">成片</span>
                </div>
            </div>

            <!-- ===== 阶段一：剧本 ===== -->
            <section class="stage-panel" id="stagePanel1">
                <h2>📝 阶段一：剧本</h2>
                <textarea id="ideaInput" placeholder="输入你的创意...&#10;例如：一个赛博朋克风格的短片，讲一个机器人在雨夜觉醒..." rows="4"></textarea>
                <div class="upload-row">
                    <label class="upload-btn">
                        📎 上传剧本文件
                        <input type="file" id="scriptFileUpload" accept=".txt,.md,.docx,.doc" onchange="handleScriptUpload(this)" hidden>
                    </label>
                    <span id="scriptUploadName" class="upload-name"></span>
                    <button class="btn-img-delete inline" id="btnRemoveScript" style="display:none" onclick="removeScriptUpload()">×</button>
                </div>
                <label class="select-label">模型选择</label>
                <select id="scriptProvider">
                    <option value="kimi">Kimi</option>
                    <option value="deepseek">DeepSeek</option>
                </select>
                <button onclick="generateScript()" class="btn-primary" id="btnGenerateScript">生成剧本</button>
                <button onclick="skipScriptGeneration()" class="btn-skip" id="btnSkipScript" style="display:none">跳过生成，直接使用上传的剧本 →</button>
                <div id="scriptDisplay" class="display-area"></div>
                <div id="scriptRevision" class="revision-area" style="display:none;">
                    <textarea id="scriptFeedback" placeholder="输入修改意见..." rows="3"></textarea>
                    <button onclick="reviseScript()" class="btn-secondary">修改剧本</button>
                </div>
                <div class="stage-nav">
                    <button onclick="switchStage(2)" class="btn-primary" id="toStage2">进入下一阶段 →</button>
                </div>
            </section>

            <!-- ===== 阶段二：分镜脚本 ===== -->
            <section class="stage-panel" id="stagePanel2" style="display:none;">
                <h2>🎬 阶段二：分镜脚本</h2>
                <label class="select-label">模型选择</label>
                <select id="storyboardProvider">
                    <option value="kimi">Kimi</option>
                    <option value="deepseek">DeepSeek</option>
                </select>
                <button onclick="generateStoryboard()" class="btn-primary">生成分镜脚本</button>
                <div id="storyboardDisplay" class="display-area"></div>
                <div id="storyboardRevision" class="revision-area" style="display:none;">
                    <textarea id="storyboardFeedback" placeholder="输入修改意见..." rows="3"></textarea>
                    <button onclick="reviseStoryboard()" class="btn-secondary">修改分镜脚本</button>
                </div>
                <div class="stage-nav">
                    <button onclick="switchStage(3)" class="btn-primary">进入下一阶段 →</button>
                </div>
            </section>

            <!-- ===== 阶段三：资产 ===== -->
            <section class="stage-panel" id="stagePanel3" style="display:none;">
                <h2>🎨 阶段三：资产（角色 / 场景 / 道具）</h2>
                
                <!-- 风格预设 -->
                <label class="select-label">风格选择</label>
                <div class="style-presets" id="stylePresets">
                    <label class="style-card"><input type="radio" name="stylePreset" value="3d_guochao" onchange="updateStylePrompt()"><span>🎮 3D国潮动漫</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="ink_wash" onchange="updateStylePrompt()"><span>🖌️ 中式水墨风格</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="anime_cel" onchange="updateStylePrompt()"><span>🎌 日式赛璐璐</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="hyperreal" onchange="updateStylePrompt()"><span>📸 超写实风格</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="pixel_art" onchange="updateStylePrompt()"><span>👾 像素风格</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="2d_chibi" onchange="updateStylePrompt()"><span>🎀 2DQ版风格</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="noir_film" onchange="updateStylePrompt()"><span>🎞️ 黑白电影风格</span></label>
                    <label class="style-card"><input type="radio" name="stylePreset" value="handdrawn" onchange="updateStylePrompt()"><span>✏️ 手绘风格</span></label>
                    <label class="style-card style-none"><input type="radio" name="stylePreset" value="" onchange="updateStylePrompt()" checked><span>⬜ 无风格</span></label>
                </div>
                <textarea id="stylePromptCustom" placeholder="选择风格后，风格描述会出现在这里。你也可以自由编辑..." rows="4" onchange="updateStylePrompt()"></textarea>

                <div class="asset-tabs">
                    <button class="tab-btn active" onclick="switchAssetTab('characters')">角色</button>
                    <button class="tab-btn" onclick="switchAssetTab('scenes')">场景</button>
                    <button class="tab-btn" onclick="switchAssetTab('props')">道具</button>
                </div>
                <div id="assetContent" class="asset-content">
                    <!-- 角色 -->
                    <div id="characters-tab" class="asset-tab active">
                        <div class="upload-row">
                            <label class="upload-btn upload-sm">📎 上传角色图<input type="file" accept="image/*" onchange="handleAssetUpload('characters', this)" hidden multiple></label>
                            <span id="upload-name-characters" class="upload-name"></span>
                        </div>
                        <label class="select-label">模型选择</label>
                        <select id="charProvider" onchange="updateModelOptions('char')">
                            <option value="gpt-image-2">GPT-image-2</option>
                            <option value="nano-banana">Nano Banana</option>
                            <option value="seedream-5">Seedream 5</option>
                        </select>
                        <div class="model-options-row">
                            <div class="model-option"><label class="select-label">清晰度</label><select id="charResolution"><option value="1k">1K</option><option value="2k">2K</option></select></div>
                            <div class="model-option"><label class="select-label">尺寸</label><select id="charRatio"><option value="1:1">1:1</option><option value="16:9">16:9</option></select></div>
                        </div>
                        <button onclick="generateAssets('characters')" class="btn-primary">生成角色</button>
                        <div id="charResults" class="results-grid"></div>
                    </div>
                    <!-- 场景 -->
                    <div id="scenes-tab" class="asset-tab">
                        <div class="upload-row">
                            <label class="upload-btn upload-sm">📎 上传场景图<input type="file" accept="image/*" onchange="handleAssetUpload('scenes', this)" hidden multiple></label>
                            <span id="upload-name-scenes" class="upload-name"></span>
                        </div>
                        <label class="select-label">模型选择</label>
                        <select id="sceneProvider" onchange="updateModelOptions('scene')">
                            <option value="gpt-image-2">GPT-image-2</option>
                            <option value="nano-banana">Nano Banana</option>
                            <option value="seedream-5">Seedream 5</option>
                        </select>
                        <div class="model-options-row">
                            <div class="model-option"><label class="select-label">清晰度</label><select id="sceneResolution"><option value="1k">1K</option><option value="2k">2K</option></select></div>
                            <div class="model-option"><label class="select-label">尺寸</label><select id="sceneRatio"><option value="1:1">1:1</option><option value="16:9">16:9</option></select></div>
                        </div>
                        <button onclick="generateAssets('scenes')" class="btn-primary">生成场景</button>
                        <div id="sceneResults" class="results-grid"></div>
                    </div>
                    <!-- 道具 -->
                    <div id="props-tab" class="asset-tab">
                        <div class="upload-row">
                            <label class="upload-btn upload-sm">📎 上传道具图<input type="file" accept="image/*" onchange="handleAssetUpload('props', this)" hidden multiple></label>
                            <span id="upload-name-props" class="upload-name"></span>
                        </div>
                        <label class="select-label">模型选择</label>
                        <select id="propProvider" onchange="updateModelOptions('prop')">
                            <option value="gpt-image-2">GPT-image-2</option>
                            <option value="nano-banana">Nano Banana</option>
                            <option value="seedream-5">Seedream 5</option>
                        </select>
                        <div class="model-options-row">
                            <div class="model-option"><label class="select-label">清晰度</label><select id="propResolution"><option value="1k">1K</option><option value="2k">2K</option></select></div>
                            <div class="model-option"><label class="select-label">尺寸</label><select id="propRatio"><option value="1:1">1:1</option><option value="16:9">16:9</option></select></div>
                        </div>
                        <button onclick="generateAssets('props')" class="btn-primary">生成道具</button>
                        <div id="propResults" class="results-grid"></div>
                    </div>
                </div>
                <div class="stage-nav">
                    <button onclick="switchStage(4)" class="btn-primary">进入下一阶段 →</button>
                </div>
            </section>

            <!-- ===== 阶段四：分镜画面 ===== -->
            <section class="stage-panel" id="stagePanel4" style="display:none;">
                <h2>🖼️ 阶段四：分镜画面 <span class="optional-tag">可跳过</span></h2>
                <p class="stage-desc">将生成的资产与分镜脚本结合，生成带画面的分镜板。如果不需要可跳过。</p>
                <div class="skip-row">
                    <button onclick="skipStage4()" class="btn-skip" id="btnSkipStage4">跳过此阶段</button>
                    <button onclick="generateVisualStoryboard()" class="btn-primary">生成分镜画面</button>
                </div>
                <div id="visualStoryboardDisplay" class="display-area"></div>
                <div class="stage-nav">
                    <button onclick="switchStage(5)" class="btn-primary">进入下一阶段 →</button>
                </div>
            </section>

            <!-- ===== 阶段五：制作成片 ===== -->
            <section class="stage-panel" id="stagePanel5" style="display:none;">
                <h2>🎥 阶段五：制作成片</h2>
                <p class="stage-desc">自动生成视频片段 + 配音 + 音乐 + 音效，然后合成最终成片。</p>
                
                <label class="select-label">模型选择</label>
                <select id="videoProvider" onchange="updateVideoOptions()">
                    <option value="seedance-2.0">Seedance 2.0</option>
                    <option value="seedance-2.0-fast">Seedance 2.0 Fast</option>
                    <option value="seedance-2.0-mini">Seedance 2.0 Mini</option>
                    <option value="keling-v3">Keling V3.0 Omni</option>
                    <option value="wan-2.7">Wan 2.7</option>
                </select>

                <div class="video-options">
                    <label class="select-label">时长</label>
                    <div class="duration-slider-row">
                        <input type="range" id="videoDuration" min="2" max="15" value="5" step="1" oninput="updateDurationLabel()">
                        <span class="duration-label" id="durationLabel">5秒</span>
                    </div>

                    <label class="select-label">清晰度</label>
                    <select id="videoQuality">
                        <option value="480p">480p</option>
                        <option value="720p">720p</option>
                        <option value="1080p">1080p</option>
                        <option value="4k">4K</option>
                    </select>

                    <label class="select-label">尺寸</label>
                    <select id="videoRatio">
                        <option value="21:9">21:9</option>
                        <option value="16:9">16:9</option>
                        <option value="4:3">4:3</option>
                        <option value="1:1">1:1</option>
                        <option value="3:4">3:4</option>
                        <option value="9:16">9:16</option>
                    </select>
                </div>

                <label class="select-label">模型选择（配音/音乐/音效）</label>
                <div class="api-row">
                    <select id="ttsProvider"><option value="minimax">MiniMax</option><option value="placeholder5">（备选 TTS API）</option></select>
                    <select id="musicProvider"><option value="suno">Suno</option><option value="placeholder6">（备选音乐 API）</option></select>
                    <select id="sfxProvider"><option value="noiz">Noiz</option><option value="placeholder7">（备选音效 API）</option></select>
                </div>
                <input type="text" id="outputName" placeholder="输出文件名（可选）">
                <div class="final-options">
                    <label id="useImagesLabel"><input type="checkbox" id="useImages" checked onchange="toggleRefImage()"> 使用参考图像</label>
                    <label><input type="checkbox" id="skipAudio" onchange="toggleAudioSelects()"> 不额外生成音频</label>
                </div>
                <div id="refImageSection" class="ref-image-section">
                    <label class="select-label">参考图像</label>
                    <div class="upload-row">
                        <label class="upload-btn">📎 上传参考图<input type="file" id="refImageUpload" accept="image/*" onchange="handleRefImage(this)" hidden multiple></label>
                        <span id="refImageName" class="upload-name"></span>
                    </div>
                    <div id="refImagePreview" class="ref-preview"></div>
                </div>
                <button onclick="makeFilm()" class="btn-primary btn-large">制作成片</button>
                <div id="filmProgress" class="film-progress" style="display:none;"></div>
                <div id="finalResult" class="final-result"></div>
            </section>
        </div>
    </div>

    <div id="loading" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
        <p id="loadingText">处理中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
